<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Booking - Amikom Soccer Arena</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-amikom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Amikom Soccer Arena</a>
            <div class="ms-auto">
                <span class="text-white me-3" id="welcomeText"></span>
                <button class="btn btn-sm btn-outline-light" id="btnLogout">Logout</button>
            </div>
        </div>
    </nav>

    <section class="section-white section-padding" style="padding-top:120px; min-height:80vh;">
        <div class="container">
            <h2 class="section-title mb-4">Riwayat Booking Saya</h2>
            <div id="bookingList" class="row g-3"></div>
        </div>
    </section>

    <script src="assets/js/api.js"></script>
    <script>
        const user = requireAuth(["customer"]);
        if (user) document.getElementById("welcomeText").textContent = `Halo, ${user.name}`;

        document.getElementById("btnLogout").addEventListener("click", () => {
            Auth.clearSession();
            window.location.href = "login.html";
        });

        const statusBadge = {
            pending: "bg-warning text-dark",
            confirmed: "bg-success",
            cancelled: "bg-secondary",
            expired: "bg-danger",
            completed: "bg-primary",
            rescheduled: "bg-info text-dark",
        };

        async function loadBookings() {
            try {
                const { bookings } = await apiFetch("/bookings/me");
                const container = document.getElementById("bookingList");

                if (!bookings.length) {
                    container.innerHTML = `<p class="text-muted">Belum ada riwayat booking.</p>`;
                    return;
                }

                container.innerHTML = bookings
                    .map(
                        (b) => `
                    <div class="col-md-6">
                        <div class="feature-card-white p-3">
                            <div class="d-flex justify-content-between">
                                <h6>${b.field_name}</h6>
                                <span class="badge ${statusBadge[b.status] || "bg-secondary"}">${b.status}</span>
                            </div>
                            <p class="mb-1"><i class="bi bi-calendar-event"></i> ${new Date(b.date).toLocaleDateString("id-ID")}</p>
                            <p class="mb-1"><i class="bi bi-clock"></i> ${b.start_time.slice(0,5)} - ${b.end_time.slice(0,5)}</p>
                            <p class="mb-2"><b>Rp${Number(b.total_price).toLocaleString("id-ID")}</b></p>
                            ${b.status === "pending" || b.status === "confirmed"
                                ? `<button class="btn btn-sm btn-outline-danger" onclick="cancelBooking(${b.id})">Batalkan</button>`
                                : ""}
                        </div>
                    </div>
                `,
                    )
                    .join("");
            } catch (err) {
                alert(err.message);
            }
        }

        async function cancelBooking(id) {
            if (!confirm("Yakin batalkan booking ini?")) return;
            try {
                const res = await apiFetch(`/bookings/${id}/cancel`, { method: "PATCH" });
                alert(res.message + (res.refundPolicy ? `\n${res.refundPolicy.reason}` : ""));
                loadBookings();
            } catch (err) {
                alert(err.message);
            }
        }

        if (user) loadBookings();
    </script>
</body>

</html>
