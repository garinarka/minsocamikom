<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Daftar - Amikom Soccer Arena</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-amikom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Amikom Soccer Arena</a>
        </div>
    </nav>

    <section class="section-cream section-padding" style="min-height:100vh; padding-top:120px;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <ul class="nav nav-pills mb-4 justify-content-center" id="authTab">
                        <li class="nav-item">
                            <button class="nav-link active" data-tab="login">Login</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-tab="register">Daftar Akun</button>
                        </li>
                    </ul>

                    <div id="alertBox" class="alert d-none"></div>

                    <!-- LOGIN -->
                    <form id="loginForm" class="feature-card-white p-4">
                        <h5 class="mb-3">Masuk ke Akun</h5>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="loginEmail" placeholder="Email" required>
                            <label for="loginEmail">Email</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                            <label for="loginPassword">Password</label>
                        </div>
                        <button type="submit" class="btn w-100 text-white" style="background:var(--amikom-orange, #ff6b00);">Login</button>
                    </form>

                    <!-- REGISTER -->
                    <form id="registerForm" class="feature-card-white p-4 d-none">
                        <h5 class="mb-3">Daftar Akun Baru</h5>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="regName" placeholder="Nama" required>
                            <label for="regName">Nama Lengkap</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="regEmail" placeholder="Email" required>
                            <label for="regEmail">Email</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="tel" class="form-control" id="regPhone" placeholder="No HP">
                            <label for="regPhone">No HP (opsional)</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="regPassword" placeholder="Password" required minlength="6">
                            <label for="regPassword">Password (min. 6 karakter)</label>
                        </div>
                        <button type="submit" class="btn w-100 text-white" style="background:var(--amikom-orange, #ff6b00);">Daftar</button>
                        <p class="small text-muted mt-2 mb-0">Akun baru otomatis berperan sebagai <b>customer</b>.</p>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/js/api.js"></script>
    <script>
        const tabButtons = document.querySelectorAll("#authTab button");
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");
        const alertBox = document.getElementById("alertBox");

        tabButtons.forEach((btn) => {
            btn.addEventListener("click", () => {
                tabButtons.forEach((b) => b.classList.remove("active"));
                btn.classList.add("active");
                const isLogin = btn.dataset.tab === "login";
                loginForm.classList.toggle("d-none", !isLogin);
                registerForm.classList.toggle("d-none", isLogin);
            });
        });

        function showAlert(message, type = "danger") {
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
        }

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            try {
                const data = await apiFetch("/auth/login", {
                    method: "POST",
                    body: JSON.stringify({
                        email: document.getElementById("loginEmail").value,
                        password: document.getElementById("loginPassword").value,
                    }),
                });
                Auth.setSession(data.token, data.user);
                showAlert("Login berhasil, mengalihkan...", "success");
                setTimeout(() => {
                    window.location.href = data.user.role === "customer" ? "booking.html" : "dashboard.html";
                }, 800);
            } catch (err) {
                showAlert(err.message);
            }
        });

        registerForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            try {
                const data = await apiFetch("/auth/register", {
                    method: "POST",
                    body: JSON.stringify({
                        name: document.getElementById("regName").value,
                        email: document.getElementById("regEmail").value,
                        phone: document.getElementById("regPhone").value,
                        password: document.getElementById("regPassword").value,
                    }),
                });
                Auth.setSession(data.token, data.user);
                showAlert("Registrasi berhasil, mengalihkan...", "success");
                setTimeout(() => (window.location.href = "booking.html"), 800);
            } catch (err) {
                showAlert(err.message);
            }
        });
    </script>
</body>

</html>
